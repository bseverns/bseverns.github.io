satellite_groups:
  - title: "Ethics + Participation"
    summary: "Projects that make consent, refusal, documentation, and participant experience visible as part of the work."
    items:
      - title: "Human-Buffer"
        url: "/atlas/n/humanbuffer/"
        repo: "https://github.com/bseverns/Human-Buffer"
        why: "Consent-forward vision station that turns data flow, opt-in, and refusal into public interface decisions."
        relates: "Supports Memory Engine and the documentation/ethics line of the practice."
      - title: "machine-docs"
        url: "/atlas/n/machinedocs/"
        repo: "https://github.com/bseverns/machine-docs"
        why: "Makes diagrams, setup notes, and operating knowledge durable enough to circulate beyond the original build moment."
        relates: "Supports Syllabus, Class Hub, and the archive/distribution layer."
      - title: "repair-studio"
        url: "/atlas/n/repairstudio/"
        repo: "https://github.com/bseverns/repair-studio"
        why: "Treats care, maintenance, and field repair as active cultural work instead of backstage cleanup."
        relates: "Supports Class Hub, seedBox, and the site-wide care thesis."
  - title: "Embodied Tools"
    summary: "Instrument and interface projects that extend the control-language and sensing questions around the core tool work."
    items:
      - title: "StringField"
        url: "/atlas/n/stringfieldnode/"
        repo: "https://github.com/bseverns/StringField"
        why: "Spatial and gestural interface research exploring pluck, scrape, and bow metaphors through sensor systems."
        relates: "Extends MOARkNOBS-42 and seedBox into embodied interface R&D."
      - title: "DustPress"
        url: "/atlas/n/dustpress/"
        repo: "https://github.com/bseverns/DustPress"
        why: "A useful bridge between build artifacts and public-facing distribution when the work needs publishing infrastructure, not just a README."
        relates: "Strengthens the systems/distribution story around the tool fleet."
  - title: "Scene Systems"
    summary: "Projects that show how performance, telemetry, and generative systems spread outward from the core scene work."
    items:
      - title: "live-rig-control"
        url: "/atlas/n/liverigctrl/"
        repo: "https://github.com/bseverns/live-rig-control"
        why: "Makes the rig legible as a control system rather than a black-box performance setup."
        relates: "Direct support layer for live-rig and interoperable scene work."
      - title: "drone-chorus"
        url: "/atlas/n/dronechorus/"
        repo: "https://github.com/bseverns/drone-chorus"
        why: "Routes flight telemetry into musical and visual structure, widening the scene/control branch of the practice."
        relates: "Connects live-rig logic to distributed sensing and performance."
      - title: "pointy-clumps"
        url: "/atlas/n/pointyclumps/"
        repo: "https://github.com/bseverns/pointy-clumps"
        why: "Wind- and telemetry-driven generative form work that gives the fleet a strong material and sculptural branch."
        relates: "A scene-adjacent generative satellite with a distinct visual identity."
